name: Sync Translations

on:
  push:
    paths:
      - 'i18n/locales/en.json'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger localization package regeneration
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.LOCALIZATION_PAT }}" \
            "https://api.github.com/repos/FynnCloudProject/FynnCloud-Localization/dispatches" \
            -d '{"event_type": "translations-updated"}'
